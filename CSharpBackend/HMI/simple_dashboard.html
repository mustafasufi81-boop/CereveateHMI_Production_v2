<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple HMI Dashboard - OPC + PLC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .status-item {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid transparent;
        }

        .status-item.connected {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
        }

        .status-item.disconnected {
            border-color: #f44336;
            background: rgba(244, 67, 54, 0.2);
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            text-align: center;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .tag-grid {
            display: grid;
            gap: 15px;
        }

        .tag-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            border-left: 4px solid #4CAF50;
            transition: all 0.3s ease;
        }

        .tag-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .tag-name {
            font-size: 0.9em;
            color: #B0BEC5;
            margin-bottom: 5px;
        }

        .tag-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #00E676;
            text-shadow: 0 0 10px rgba(0, 230, 118, 0.5);
        }

        .tag-unit {
            font-size: 0.8em;
            color: #90A4AE;
            margin-left: 5px;
        }

        .tag-quality {
            font-size: 0.7em;
            margin-top: 5px;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
        }

        .quality-good {
            background: #4CAF50;
            color: white;
        }

        .quality-bad {
            background: #f44336;
            color: white;
        }

        .quality-unknown {
            background: #FF9800;
            color: white;
        }

        .last-update {
            text-align: center;
            margin-top: 30px;
            color: #B0BEC5;
            font-size: 0.9em;
        }

        .plc-source {
            border-left-color: #2196F3;
        }

        .opc-source {
            border-left-color: #FF9800;
        }

        .loading {
            text-align: center;
            color: #FFD700;
            font-size: 1.2em;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
            border-radius: 5px;
            padding: 10px;
            margin: 10px 0;
            color: #ffcdd2;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏭 Simple HMI Dashboard</h1>
        <div class="status-bar">
            <div class="status-item" id="opcStatus">
                <strong>OPC Data:</strong> <span id="opcStatusText">Checking...</span>
            </div>
            <div class="status-item" id="plcStatus">
                <strong>PLC Data:</strong> <span id="plcStatusText">Checking...</span>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- PLC Tags Section -->
        <div class="section">
            <div class="section-title">🔵 PLC Tags (MQTT)</div>
            <div class="tag-grid" id="plcTags">
                <div class="loading">Loading PLC data...</div>
            </div>
        </div>

        <!-- OPC Tags Section -->
        <div class="section">
            <div class="section-title">🟡 OPC Tags (Historian)</div>
            <div class="tag-grid" id="opcTags">
                <div class="loading">Loading OPC data...</div>
            </div>
        </div>
    </div>

    <div class="last-update">
        Last Update: <span id="lastUpdateTime">Never</span>
    </div>

    <script>
        // Configuration
        const UPDATE_INTERVAL = 2000; // 2 seconds
        
        // Key tags to display
        const PLC_TAGS = [
            'Blastfurnace_Tuyer1_Pressure',
            'Boiler_Inlet_Pressure', 
            'Boiler_Inlet_Temp',
            'Pump_RPM',
            'Load_MW',
            'Pump_Motor_Current'
        ];

        const OPC_TAGS = [
            '@ClientCount',
            'Random.Real4',
            'Random.Int2', 
            'Random.String',
            'Bucket.Brigade.Real4',
            'Triangle Waves.Real8'
        ];

        let lastUpdateTime = new Date();

        // Update functions
        function updateStatusIndicator(elementId, isConnected) {
            const element = document.getElementById(elementId);
            if (isConnected) {
                element.className = 'status-item connected';
            } else {
                element.className = 'status-item disconnected';
            }
        }

        function createTagCard(tagName, tagData, source) {
            const value = tagData.value !== null && tagData.value !== undefined ? tagData.value : 'N/A';
            const quality = tagData.quality || 'UNKNOWN';
            const sourceClass = source === 'PLC' ? 'plc-source' : 'opc-source';
            const qualityClass = quality === 'GOOD' || quality === 'Good' ? 'quality-good' : 
                                quality === 'BAD' || quality === 'Bad' ? 'quality-bad' : 'quality-unknown';

            // Determine unit based on tag name
            let unit = '';
            if (tagName.includes('Pressure')) unit = 'PSI';
            else if (tagName.includes('Temp')) unit = '°C';
            else if (tagName.includes('RPM')) unit = 'RPM';
            else if (tagName.includes('Current')) unit = 'A';
            else if (tagName.includes('Load_MW')) unit = 'MW';

            return `
                <div class="tag-card ${sourceClass}">
                    <div class="tag-name">${tagName}</div>
                    <div class="tag-value">
                        ${value}
                        <span class="tag-unit">${unit}</span>
                    </div>
                    <div class="tag-quality ${qualityClass}">${quality}</div>
                </div>
            `;
        }

        function displayError(containerId, message) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div class="error">❌ ${message}</div>`;
        }

        async function fetchData() {
            try {
                console.log('🔄 Fetching data from /api/tags/latest');
                
                const response = await fetch('/api/tags/latest');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('✅ Data received:', data);
                
                // Update status indicators
                const hasOpcData = data.sources?.historian_connected || false;
                const hasPlcData = data.sources?.mqtt_connected || false;
                
                updateStatusIndicator('opcStatus', hasOpcData);
                updateStatusIndicator('plcStatus', hasPlcData);
                
                document.getElementById('opcStatusText').textContent = hasOpcData ? 'Connected' : 'Disconnected';
                document.getElementById('plcStatusText').textContent = hasPlcData ? 'Connected' : 'Disconnected';

                // Display PLC tags
                let plcHtml = '';
                let plcCount = 0;
                PLC_TAGS.forEach(tagName => {
                    if (data.tags && data.tags[tagName]) {
                        plcHtml += createTagCard(tagName, data.tags[tagName], 'PLC');
                        plcCount++;
                    }
                });
                
                if (plcCount === 0) {
                    plcHtml = '<div class="error">❌ No PLC tags found</div>';
                }
                
                document.getElementById('plcTags').innerHTML = plcHtml;

                // Display OPC tags  
                let opcHtml = '';
                let opcCount = 0;
                OPC_TAGS.forEach(tagName => {
                    if (data.tags && data.tags[tagName]) {
                        opcHtml += createTagCard(tagName, data.tags[tagName], 'OPC');
                        opcCount++;
                    }
                });
                
                if (opcCount === 0) {
                    opcHtml = '<div class="error">❌ No OPC tags found</div>';
                }
                
                document.getElementById('opcTags').innerHTML = opcHtml;

                // Update timestamp
                lastUpdateTime = new Date();
                document.getElementById('lastUpdateTime').textContent = lastUpdateTime.toLocaleTimeString();
                
                console.log(`📊 Displayed ${plcCount} PLC tags, ${opcCount} OPC tags`);

            } catch (error) {
                console.error('❌ Fetch error:', error);
                displayError('plcTags', `Failed to fetch data: ${error.message}`);
                displayError('opcTags', `Failed to fetch data: ${error.message}`);
                
                // Update status to disconnected
                updateStatusIndicator('opcStatus', false);
                updateStatusIndicator('plcStatus', false);
                document.getElementById('opcStatusText').textContent = 'Error';
                document.getElementById('plcStatusText').textContent = 'Error';
            }
        }

        // Start polling
        console.log('🚀 Starting Simple HMI Dashboard');
        fetchData(); // Initial load
        setInterval(fetchData, UPDATE_INTERVAL);
        
        // Update time display
        setInterval(() => {
            const now = new Date();
            const timeSinceUpdate = Math.floor((now - lastUpdateTime) / 1000);
            if (timeSinceUpdate > 10) {
                document.getElementById('lastUpdateTime').textContent = `${timeSinceUpdate}s ago`;
            }
        }, 1000);
    </script>
</body>
</html>
