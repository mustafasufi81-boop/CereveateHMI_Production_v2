<!DOCTYPE html>
<html>
<head>
    <title>Simple OPC Test</title>
    <meta charset="UTF-8">
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background: #0a0a0a; 
            color: #0f0; 
            padding: 20px;
            font-size: 14px;
        }
        h1 { color: #0ff; }
        .status { 
            background: #1a1a1a; 
            padding: 15px; 
            margin: 10px 0; 
            border-left: 4px solid #0f0; 
        }
        .log { 
            background: #0a0a0a; 
            padding: 10px; 
            margin: 5px 0; 
            border-left: 2px solid #666; 
            font-size: 12px;
        }
        .error { border-left-color: #f00; color: #f00; }
        .success { border-left-color: #0f0; }
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin-top: 20px; 
            background: #1a1a1a;
        }
        th, td { 
            border: 1px solid #333; 
            padding: 10px; 
            text-align: left; 
        }
        th { background: #222; color: #0ff; }
        .good { color: #0f0; font-weight: bold; }
        .waiting { color: #fa0; }
        #pollStatus { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🧪 MINIMAL OPC POLLING TEST</h1>
    
    <div class="status">
        <div id="pollStatus">⏳ Initializing...</div>
        <div id="lastUpdate" style="color: #888; margin-top: 5px;">No data yet</div>
    </div>
    
    <h2>📊 Live Tag Values (Top 15)</h2>
    <table id="tagTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Tag ID</th>
                <th>Value</th>
                <th>Quality</th>
                <th>Timestamp</th>
            </tr>
        </thead>
        <tbody id="tagBody">
            <tr><td colspan="5" style="text-align: center; color: #888;">Waiting for data...</td></tr>
        </tbody>
    </table>
    
    <h2>📝 Console Logs</h2>
    <div id="logs"></div>

    <script>
        let pollCount = 0;
        const logsDiv = document.getElementById('logs');
        const statusDiv = document.getElementById('pollStatus');
        const lastUpdateDiv = document.getElementById('lastUpdate');
        const tagBody = document.getElementById('tagBody');
        
        function addLog(message, isError = false, isSuccess = false) {
            const div = document.createElement('div');
            div.className = 'log' + (isError ? ' error' : '') + (isSuccess ? ' success' : '');
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.insertBefore(div, logsDiv.firstChild);
            console.log(message);
            
            // Keep only last 20 logs
            while (logsDiv.children.length > 20) {
                logsDiv.removeChild(logsDiv.lastChild);
            }
        }
        
        async function pollOPC() {
            pollCount++;
            const timestamp = new Date().toLocaleTimeString();
            
            statusDiv.textContent = `🔄 Poll #${pollCount} at ${timestamp}`;
            addLog(`🔄 Polling OPC API...`);
            
            try {
                const response = await fetch('http://localhost:5001/api/opc/values');
                
                if (!response.ok) {
                    const errorMsg = `HTTP ${response.status}: ${response.statusText}`;
                    statusDiv.textContent = `❌ ${errorMsg}`;
                    addLog(`❌ ${errorMsg}`, true);
                    return;
                }
                
                const data = await response.json();
                const successMsg = `✅ Received ${data.tags.length} tags`;
                statusDiv.textContent = successMsg;
                lastUpdateDiv.textContent = `Last update: ${timestamp}`;
                addLog(successMsg, false, true);
                
                // Update table with first 15 tags
                tagBody.innerHTML = '';
                data.tags.slice(0, 15).forEach((tag, index) => {
                    const row = tagBody.insertRow();
                    row.insertCell(0).textContent = index + 1;
                    row.insertCell(1).textContent = tag.tagId;
                    
                    const valueCell = row.insertCell(2);
                    valueCell.textContent = tag.value;
                    valueCell.style.fontWeight = 'bold';
                    
                    const qualityCell = row.insertCell(3);
                    qualityCell.textContent = tag.quality;
                    qualityCell.className = tag.quality === 'GOOD' ? 'good' : 'waiting';
                    
                    row.insertCell(4).textContent = new Date(tag.timestamp).toLocaleTimeString();
                });
                
                // Log a few sample values
                data.tags.slice(0, 3).forEach(tag => {
                    addLog(`   📊 ${tag.tagId} = ${tag.value} (${tag.quality})`);
                });
                
            } catch (error) {
                const errorMsg = `FETCH ERROR: ${error.message}`;
                statusDiv.textContent = `❌ ${errorMsg}`;
                addLog(`❌ ${errorMsg}`, true);
                console.error('Full error:', error);
            }
        }
        
        // Start immediately
        addLog('🚀 Starting OPC polling test...', false, true);
        addLog('📡 Target: http://localhost:5001/api/opc/values');
        addLog('⏱️ Interval: 2 seconds');
        
        // First poll after 1 second
        setTimeout(() => {
            pollOPC();
            // Then poll every 2 seconds
            setInterval(pollOPC, 2000);
        }, 1000);
    </script>
</body>
</html>
