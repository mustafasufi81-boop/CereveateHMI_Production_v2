<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Live OPC Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        .header {
            background: #16213e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #ff4444;
            margin-left: 10px;
        }
        .status.connected {
            background: #44ff44;
            color: #000;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #16213e;
            border-radius: 10px;
            overflow: hidden;
        }
        th {
            background: #0f3460;
            padding: 15px;
            text-align: left;
        }
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #0f3460;
        }
        tr:hover {
            background: #1a1a3e;
        }
        .value {
            font-weight: bold;
            color: #00d9ff;
            font-size: 18px;
        }
        .timestamp {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔴 Simple Live OPC/PLC Data</h1>
        <span>Status: <span class="status" id="status">Connecting...</span></span>
        <span style="margin-left: 20px;">Updates: <span id="updates">0</span></span>
    </div>

    <table>
        <thead>
            <tr>
                <th>Tag ID</th>
                <th>Value</th>
                <th>Quality</th>
                <th>Last Update</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <tr>
                <td colspan="4" style="text-align: center;">Loading...</td>
            </tr>
        </tbody>
    </table>

    <script>
        let updateCount = 0;
        
        async function fetchData() {
            try {
                const response = await fetch('http://localhost:5001/api/opc/values');
                const data = await response.json();
                
                updateCount++;
                document.getElementById('updates').textContent = updateCount;
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').classList.add('connected');
                
                displayData(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').classList.remove('connected');
            }
        }
        
        function displayData(data) {
            const tbody = document.getElementById('data-table');
            const now = new Date().toLocaleTimeString();
            
            let html = '';
            data.tags.forEach(tag => {
                const quality = tag.quality === 192 ? '✅ Good' : '❌ Bad';
                html += `
                    <tr>
                        <td>${tag.tagId}</td>
                        <td class="value">${tag.value}</td>
                        <td>${quality}</td>
                        <td class="timestamp">${now}</td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
        }
        
        // Start polling every 1 second
        fetchData();
        setInterval(fetchData, 1000);
    </script>
</body>
</html>
