<!DOCTYPE html>
<html>
<head>
    <title>OPC Polling Test</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #fff; padding: 20px; }
        .log { background: #2d2d2d; padding: 10px; margin: 10px 0; border-left: 3px solid #0d7; }
        .error { border-left-color: #d00; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
        th { background: #333; }
        .good { color: #0f0; }
        .waiting { color: #fa0; }
    </style>
</head>
<body>
    <h1>🧪 OPC Polling Test - Direct Fetch</h1>
    <div id="status">Initializing...</div>
    <div id="logs"></div>
    
    <h2>Live Tag Values</h2>
    <table id="tagTable">
        <tr><th>Tag ID</th><th>Value</th><th>Quality</th><th>Timestamp</th></tr>
    </table>

    <script>
        let pollCount = 0;
        const logs = document.getElementById('logs');
        const status = document.getElementById('status');
        const table = document.getElementById('tagTable');
        
        function log(message, isError = false) {
            const div = document.createElement('div');
            div.className = isError ? 'log error' : 'log';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.insertBefore(div, logs.firstChild);
            console.log(message);
        }
        
        async function pollOPC() {
            pollCount++;
            status.textContent = `Poll #${pollCount} at ${new Date().toLocaleTimeString()}`;
            
            try {
                log(`🔄 Polling http://localhost:5001/api/opc/values`);
                
                const response = await fetch('http://localhost:5001/api/opc/values');
                
                if (!response.ok) {
                    log(`❌ ERROR: ${response.status} ${response.statusText}`, true);
                    return;
                }
                
                const data = await response.json();
                log(`✅ Received ${data.tags.length} tags`);
                
                // Update table
                table.innerHTML = '<tr><th>Tag ID</th><th>Value</th><th>Quality</th><th>Timestamp</th></tr>';
                
                data.tags.slice(0, 10).forEach(tag => {
                    const row = table.insertRow();
                    row.insertCell(0).textContent = tag.tagId;
                    row.insertCell(1).textContent = tag.value;
                    const qualityCell = row.insertCell(2);
                    qualityCell.textContent = tag.quality;
                    qualityCell.className = tag.quality === 'GOOD' ? 'good' : 'waiting';
                    row.insertCell(3).textContent = new Date(tag.timestamp).toLocaleTimeString();
                });
                
            } catch (error) {
                log(`❌ FETCH ERROR: ${error.message}`, true);
            }
        }
        
        // Start polling immediately
        log('🚀 Starting OPC polling test...');
        pollOPC();
        setInterval(pollOPC, 1000);
    </script>
</body>
</html>
