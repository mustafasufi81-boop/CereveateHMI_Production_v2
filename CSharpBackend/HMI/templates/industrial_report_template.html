<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Plant Reporting System</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f8; margin: 0; padding: 0; }
        .app { max-width: 1200px; margin: 16px auto; padding: 16px; background: white; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
        .section { margin-bottom: 20px; }
        .section h2 { margin: 8px 0; }
        .grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
        .full { grid-column: 1 / -1; }
        label { display: block; margin-bottom: 4px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; border: 1px solid #ccd6dd; border-radius: 4px; }
        textarea { min-height: 72px; }
        .actions { display: flex; gap: 12px; margin-top: 12px; }
        .actions button { padding: 10px 14px; border: none; border-radius: 4px; cursor: pointer; }
        .actions button.primary { background: #1f78d1; color: white; }
        .actions button.secondary { background: #e2e8f0; }
    </style>
</head>
<body>
<div class="app">
    <h1>Industrial Plant Reporting System</h1>
    <div class="section">
        <h2>Plant Type Selector</h2>
        <button onclick="selectPlant('Power')">Power Plant</button>
        <button onclick="selectPlant('Steel')">Steel Plant</button>
        <button onclick="selectPlant('Aluminium')">Aluminium Plant</button>
        <p id="selectedPlant">Selected: <strong>None</strong></p>
    </div>
    <div class="section" id="reportHeader">
        <h2>Report Header (Common)</h2>
        <div class="grid">
            <div><label>Date</label><input type="date" id="reportDate"></div>
            <div><label>Shift</label><select id="reportShift"><option>A</option><option>B</option><option>C</option></select></div>
            <div><label>Unit / Area</label><input type="text" id="unitArea"></div>
            <div><label>Supervisor Name</label><input type="text" id="supervisorName"></div>
            <div class="full"><label>Operator Name</label><input type="text" id="operatorName"></div>
        </div>
    </div>
    <div class="section" id="plantSpecificFields">
        <h2>Operation Summary (Plant-specific)</h2>
        <p>Will be dynamically loaded based on plant type selection.</p>
    </div>
    <div class="section">
        <h2>Log Management</h2>
        <p>Use local storage to save logs and attach to reports.</p>
    </div>
    <div class="section">
        <div class="actions">
            <button class="primary" onclick="generateReport()">Generate Complete Report</button>
            <button class="secondary" onclick="window.print()">Print / Save as PDF</button>
        </div>
    </div>
    <div class="section" id="reportOutput">
        <h2>Generated Report (Preview)</h2>
        <pre id="reportText" style="background:#f0f4f8;padding:10px;border-radius:5px;"></pre>
    </div>
</div>

<script>
let selectedPlantType = null;

function selectPlant(type) {
    selectedPlantType = type;
    document.getElementById('selectedPlant').innerHTML = 'Selected: <strong>' + type + '</strong>';
    document.getElementById('plantSpecificFields').innerHTML = '<h2>Operation Summary (' + type + ')</h2><p>Dynamic fields for ' + type + ' will appear here.</p>';
}

function generateReport() {
    const report = {
        reportId: 'RPT-' + Date.now(),
        plantType: selectedPlantType || 'None',
        date: document.getElementById('reportDate').value,
        shift: document.getElementById('reportShift').value,
        unitArea: document.getElementById('unitArea').value,
        supervisorName: document.getElementById('supervisorName').value,
        operatorName: document.getElementById('operatorName').value,
        generatedAt: new Date().toLocaleString()
    };
    const stored = JSON.parse(localStorage.getItem('industrialReports') || '[]');
    stored.unshift(report);
    localStorage.setItem('industrialReports', JSON.stringify(stored));
    document.getElementById('reportText').innerText = JSON.stringify(report, null, 2);
    alert('Report saved locally in localStorage');
}
</script>
</body>
</html>
