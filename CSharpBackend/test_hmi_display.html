<!DOCTYPE html>
<html>
<head>
    <title>Test HMI Data</title>
</head>
<body>
    <h1>Testing HMI API Data</h1>
    <button onclick="testAPI()">Fetch Data</button>
    <pre id="output"></pre>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('http://localhost:1202/api/opc/values');
                const data = await response.json();
                
                const output = document.getElementById('output');
                output.textContent = 'Total tags: ' + data.count + '\n\n';
                
                // Find welding tags
                const weldingTags = data.tags.filter(t => 
                    t.tagId.includes('Weld') || 
                    t.tagId === 'Arc' || 
                    t.tagId.includes('WPS') ||
                    t.tagId.includes('Pipe') ||
                    t.tagId.includes('Joint')
                );
                
                output.textContent += 'Welding Tags:\n';
                weldingTags.forEach(tag => {
                    const val = tag.value;
                    const parsed = parseFloat(val);
                    output.textContent += `  ${tag.tagId} = ${val} (parsed: ${parsed}) | isNaN: ${isNaN(parsed)}\n`;
                });
                
            } catch (error) {
                document.getElementById('output').textContent = 'ERROR: ' + error;
            }
        }
    </script>
</body>
</html>
