<!DOCTYPE html>
<html>
<head>
    <title>Test Date Range Display</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        .test-case {
            background: rgba(0, 212, 255, 0.1);
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #00d4ff;
            border-radius: 4px;
        }
        .result {
            color: #00d4ff;
            font-weight: bold;
            margin-top: 5px;
        }
        .input {
            color: #888;
        }
    </style>
</head>
<body>
    <h1>📅 Date Range Display Test</h1>
    <div id="testResults"></div>

    <script>
        // Copy the exact function from advanced_bi_dashboard.js
        function formatDateRange(startDate, endDate) {
            const start = new Date(startDate);
            const end = new Date(endDate);
            const diffDays = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            
            let periodType = '';
            if (diffDays <= 1) {
                periodType = 'Daily';
            } else if (diffDays <= 7) {
                periodType = 'Weekly';
            } else if (diffDays <= 31) {
                periodType = 'Monthly';
            } else if (diffDays <= 93) {
                periodType = 'Quarterly';
            } else {
                periodType = `${diffDays} Days`;
            }
            
            const formatDate = (d) => d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            return `${formatDate(start)} to ${formatDate(end)} (${periodType} - ${diffDays} days)`;
        }

        // Test cases
        const tests = [
            {
                name: "Same Day (1 day)",
                start: "2025-11-16",
                end: "2025-11-16",
                expected: "Daily - 0 days"
            },
            {
                name: "Next Day (1 day)",
                start: "2025-11-16",
                end: "2025-11-17",
                expected: "Daily - 1 day"
            },
            {
                name: "3 Days",
                start: "2025-11-16",
                end: "2025-11-19",
                expected: "Weekly - 3 days"
            },
            {
                name: "1 Week",
                start: "2025-11-16",
                end: "2025-11-23",
                expected: "Weekly - 7 days"
            },
            {
                name: "10 Days",
                start: "2025-11-16",
                end: "2025-11-26",
                expected: "Monthly - 10 days"
            },
            {
                name: "1 Month (30 days)",
                start: "2025-11-01",
                end: "2025-12-01",
                expected: "Monthly - 30 days"
            },
            {
                name: "2 Months (60 days)",
                start: "2025-11-01",
                end: "2025-12-31",
                expected: "Quarterly - 60 days"
            },
            {
                name: "3 Months (90 days)",
                start: "2025-09-01",
                end: "2025-11-30",
                expected: "Quarterly - 90 days"
            },
            {
                name: "6 Months (180 days)",
                start: "2025-05-01",
                end: "2025-10-28",
                expected: "180 Days"
            },
            {
                name: "1 Year (365 days)",
                start: "2024-11-21",
                end: "2025-11-21",
                expected: "365 Days"
            }
        ];

        const resultsDiv = document.getElementById('testResults');
        
        tests.forEach((test, idx) => {
            const result = formatDateRange(test.start, test.end);
            const testDiv = document.createElement('div');
            testDiv.className = 'test-case';
            
            // Calculate actual diff
            const start = new Date(test.start);
            const end = new Date(test.end);
            const actualDiff = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
            
            testDiv.innerHTML = `
                <strong>Test ${idx + 1}: ${test.name}</strong>
                <div class="input">Input: ${test.start} to ${test.end}</div>
                <div class="input">Expected: ${test.expected}</div>
                <div class="result">Actual: ${result}</div>
                <div style="color: #888; font-size: 12px; margin-top: 5px;">
                    Calculated difference: ${actualDiff} days
                </div>
            `;
            
            resultsDiv.appendChild(testDiv);
        });

        // Log summary
        console.log("=" * 60);
        console.log("DATE RANGE CALCULATION TEST RESULTS");
        console.log("=" * 60);
        tests.forEach((test, idx) => {
            const result = formatDateRange(test.start, test.end);
            console.log(`Test ${idx + 1}: ${test.name}`);
            console.log(`  Input: ${test.start} to ${test.end}`);
            console.log(`  Result: ${result}`);
            console.log("");
        });
    </script>
</body>
</html>
