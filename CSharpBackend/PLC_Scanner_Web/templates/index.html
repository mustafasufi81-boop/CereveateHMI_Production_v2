<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC Scanner - SCADA View</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0D1117;
            color: #C9D1D9;
            overflow-x: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #161B22 0%, #0D1117 100%);
            padding: 20px;
            border-bottom: 2px solid #30363D;
        }
        
        .header h1 {
            color: #58A6FF;
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .status-bar {
            display: flex;
            gap: 30px;
            margin-top: 10px;
        }
        
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.connected {
            background: #3FB950;
            box-shadow: 0 0 10px #3FB950;
        }
        
        .status-dot.disconnected {
            background: #F85149;
            box-shadow: 0 0 10px #F85149;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            padding: 20px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #161B22;
            border: 1px solid #30363D;
            border-radius: 8px;
            padding: 15px;
        }
        
        .stat-label {
            color: #8B949E;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .stat-value {
            color: #58A6FF;
            font-size: 24px;
            font-weight: bold;
        }
        
        .trends-container {
            background: #161B22;
            border: 1px solid #30363D;
            border-radius: 8px;
            padding: 20px;
        }
        
        .trends-title {
            color: #58A6FF;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .trend-item {
            margin-bottom: 80px;
        }
        
        .trend-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .trend-name {
            font-size: 14px;
            font-weight: bold;
        }
        
        .trend-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        .trend-canvas-wrapper {
            position: relative;
            background: #0D1117;
            border: 2px solid #30363D;
            border-radius: 4px;
            padding: 10px;
            height: 100px;
        }
        
        .trend-canvas {
            width: 100%;
            height: 80px;
        }
        
        .trend-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            font-size: 11px;
            color: #8B949E;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #8B949E;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏭 PLC Scanner - SCADA View</h1>
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="plc-status"></div>
                <span id="plc-text">PLC: Connecting...</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="db-status"></div>
                <span id="db-text">Database: Connecting...</span>
            </div>
            <div class="status-item">
                <span id="tag-count-text">Tags: 0</span>
            </div>
            <div class="status-item">
                <span id="cache-size-text">Cache: 0</span>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">PLC Reads</div>
                <div class="stat-value" id="plc-reads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">DB Writes</div>
                <div class="stat-value" id="db-writes">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Values Cached</div>
                <div class="stat-value" id="values-cached">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Values Filtered</div>
                <div class="stat-value" id="values-filtered">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Cache Efficiency</div>
                <div class="stat-value" id="cache-efficiency">0%</div>
            </div>
        </div>
        
        <div class="trends-container">
            <div class="trends-title">📈 Live Trends</div>
            <div id="trends-list">
                <div class="no-data">Collecting data...</div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        const trendData = {};
        const MAX_POINTS = 50;
        const colors = ['#3FB950', '#58A6FF', '#D29922', '#F778BA', '#BC8CFF', '#F85149'];
        
        socket.on('connect', () => {
            console.log('✅ Connected to server');
        });
        
        socket.on('stats_update', (stats) => {
            // Update status indicators
            document.getElementById('plc-status').className = `status-dot ${stats.plc_connected ? 'connected' : 'disconnected'}`;
            document.getElementById('plc-text').textContent = `PLC: ${stats.plc_connected ? 'Connected' : 'Disconnected'}`;
            
            document.getElementById('db-status').className = `status-dot ${stats.db_connected ? 'connected' : 'disconnected'}`;
            document.getElementById('db-text').textContent = `Database: ${stats.db_connected ? 'Connected' : 'Disconnected'}`;
            
            document.getElementById('tag-count-text').textContent = `Tags: ${stats.tag_count || 0}`;
            document.getElementById('cache-size-text').textContent = `Cache: ${stats.cache_values || 0}`;
            
            // Update stats
            document.getElementById('plc-reads').textContent = (stats.plc_reads || 0).toLocaleString();
            document.getElementById('db-writes').textContent = (stats.db_writes || 0).toLocaleString();
            document.getElementById('values-cached').textContent = (stats.values_cached || 0).toLocaleString();
            document.getElementById('values-filtered').textContent = (stats.values_filtered || 0).toLocaleString();
            
            const total = (stats.values_cached || 0) + (stats.values_filtered || 0);
            const efficiency = total > 0 ? ((stats.values_filtered || 0) / total * 100).toFixed(1) : 0;
            document.getElementById('cache-efficiency').textContent = `${efficiency}%`;
        });
        
        socket.on('values_update', (values) => {
            const timestamp = new Date();
            
            // Update trend data
            for (const [tagId, value] of Object.entries(values)) {
                if (typeof value === 'number' || !isNaN(parseFloat(value))) {
                    if (!trendData[tagId]) {
                        trendData[tagId] = [];
                    }
                    trendData[tagId].push({time: timestamp, value: parseFloat(value)});
                    
                    // Keep only last MAX_POINTS
                    if (trendData[tagId].length > MAX_POINTS) {
                        trendData[tagId].shift();
                    }
                }
            }
            
            // Update trend display
            updateTrends();
        });
        
        function updateTrends() {
            const container = document.getElementById('trends-list');
            
            if (Object.keys(trendData).length === 0) {
                container.innerHTML = '<div class="no-data">Collecting data...</div>';
                return;
            }
            
            container.innerHTML = '';
            
            let colorIndex = 0;
            for (const [tagId, points] of Object.entries(trendData)) {
                if (points.length < 2) continue;
                
                const color = colors[colorIndex % colors.length];
                colorIndex++;
                
                const currentValue = points[points.length - 1].value;
                const values = points.map(p => p.value);
                const minVal = Math.min(...values);
                const maxVal = Math.max(...values);
                
                const trendHtml = `
                    <div class="trend-item">
                        <div class="trend-header">
                            <div class="trend-name" style="color: ${color}">${tagId}</div>
                            <div class="trend-value" style="color: ${color}">${currentValue.toFixed(2)}</div>
                        </div>
                        <div class="trend-canvas-wrapper">
                            <canvas class="trend-canvas" id="canvas-${tagId.replace(/[^a-zA-Z0-9]/g, '_')}"></canvas>
                        </div>
                        <div class="trend-stats">
                            <span>Min: ${minVal.toFixed(2)}</span>
                            <span>${points[0].time.toLocaleTimeString()} - ${points[points.length-1].time.toLocaleTimeString()}</span>
                            <span>Max: ${maxVal.toFixed(2)}</span>
                        </div>
                    </div>
                `;
                
                container.innerHTML += trendHtml;
                
                // Draw sparkline
                setTimeout(() => drawSparkline(tagId, points, color), 0);
            }
        }
        
        function drawSparkline(tagId, points, color) {
            const canvasId = `canvas-${tagId.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const width = canvas.offsetWidth;
            const height = canvas.offsetHeight;
            canvas.width = width;
            canvas.height = height;
            
            // Clear canvas
            ctx.clearRect(0, 0, width, height);
            
            // Draw grid lines
            ctx.strokeStyle = '#21262D';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 4; i++) {
                const y = (i * height / 4);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // Get values
            const values = points.map(p => p.value);
            const minVal = Math.min(...values);
            const maxVal = Math.max(...values);
            const range = maxVal - minVal || 1;
            
            // Draw line
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            
            points.forEach((point, i) => {
                const x = (i / (points.length - 1)) * width;
                const normalized = (point.value - minVal) / range;
                const y = height - (normalized * height);
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });
            
            ctx.stroke();
            
            // Draw dots at points
            ctx.fillStyle = color;
            points.forEach((point, i) => {
                if (i % 5 === 0) { // Every 5th point
                    const x = (i / (points.length - 1)) * width;
                    const normalized = (point.value - minVal) / range;
                    const y = height - (normalized * height);
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }
        
        // Update trends every 2 seconds
        setInterval(updateTrends, 2000);
    </script>
</body>
</html>
