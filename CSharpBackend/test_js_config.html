<!DOCTYPE html>
<html>
<head>
    <title>Test Config Loading</title>
</head>
<body>
    <h1>Testing Config API</h1>
    <pre id="output"></pre>
    <select id="sampling-interval-select"></select>
    
    <script>
        async function test() {
            const output = document.getElementById('output');
            try {
                output.textContent = 'Fetching config...\n';
                const response = await fetch('http://localhost:5002/api/config');
                const config = await response.json();
                output.textContent += 'Config received:\n' + JSON.stringify(config, null, 2) + '\n\n';
                
                if (config.sampling) {
                    output.textContent += 'Sampling config found:\n' + JSON.stringify(config.sampling, null, 2) + '\n\n';
                    
                    const selector = document.getElementById('sampling-interval-select');
                    const intervals = config.sampling.available_intervals || [];
                    const labels = config.sampling.interval_labels || {};
                    
                    output.textContent += `Populating ${intervals.length} intervals...\n`;
                    
                    intervals.forEach(interval => {
                        const option = document.createElement('option');
                        option.value = interval;
                        option.textContent = labels[interval] || `${interval} sec`;
                        selector.appendChild(option);
                        output.textContent += `Added: ${interval} = ${option.textContent}\n`;
                    });
                    
                    output.textContent += '\n✅ Success! Check dropdown above.';
                } else {
                    output.textContent += '❌ No sampling config in response!';
                }
            } catch (error) {
                output.textContent += '❌ Error: ' + error.message;
            }
        }
        
        test();
    </script>
</body>
</html>
