# ============================================================================
# Nginx Configuration for React + Flask HMI Application
# Architecture: React SPA (frontend) + Flask REST API (backend)
# ============================================================================
# Installation:
#   Linux: Copy to /etc/nginx/sites-available/hmi-flask
#          sudo ln -s /etc/nginx/sites-available/hmi-flask /etc/nginx/sites-enabled/
#          sudo nginx -t
#          sudo systemctl restart nginx
#
#   Windows: Copy to nginx\conf\sites\hmi-flask.conf
#            Include in nginx.conf: include sites/*.conf;
#            nginx -t
#            nginx -s reload
#
# Configuration Overview:
#   - Serves React build files (apex-hmi/dist/) as static content
#   - Proxies /api/* requests to Flask backend (port 6001)
#   - Proxies /socket.io/* WebSocket connections to Flask-SocketIO
#   - Handles React Router (SPA routing) with try_files
# ============================================================================

# Upstream backend servers (Gunicorn/Waitress)
upstream hmi_backend {
    # Single server configuration
    server 127.0.0.1:6001 fail_timeout=30s max_fails=3;
    
    # For load balancing across multiple workers (uncomment if needed):
    # server 127.0.0.1:6001 weight=1;
    # server 127.0.0.1:6002 weight=1;
    # server 127.0.0.1:6003 weight=1;
    
    # Connection pooling
    keepalive 32;
}

# HTTP Server (HMI Frontend Access)
server {
    listen 8080;
    listen [::]:8080;
    server_name hmi.yourdomain.com;  # Change to your domain
    
    # For Let's Encrypt SSL certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all HTTP to HTTPS (uncomment in production)
    # return 301 https://$server_name$request_uri;
    
    # Or allow HTTP for development/testing (serves React + proxies API)
    # React Static Files
    location / {
        root /opt/hmi-flask/HMI/apex-hmi/dist;  # Linux path
        # root C:/Shakil/DJangoProjects/NEW_HMI/HMI/apex-hmi/dist;  # Windows path
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    
    # React Build Assets (JS, CSS, images)
    location /assets/ {
        root /opt/hmi-flask/HMI/apex-hmi/dist;
        # root C:/Shakil/DJangoProjects/NEW_HMI/HMI/apex-hmi/dist;  # Windows
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API Endpoints - Proxy to Flask Backend
    location /api/ {
        proxy_pass http://hmi_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # WebSocket - Socket.IO
    location /socket.io/ {
        proxy_pass http://hmi_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTPS Server (Production)
server {
    listen 8443 ssl http2;
    listen [::]:8443 ssl http2;
    server_name hmi.yourdomain.com;  # Change to your domain
    
    # SSL Certificate (Let's Encrypt or your own)
    ssl_certificate /etc/letsencrypt/live/hmi.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hmi.yourdomain.com/privkey.pem;
    
    # SSL Configuration (Modern, Secure)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;
    ========================================================================
    # React Frontend Static Files
    # ========================================================================
    
    # React Build Assets (JS, CSS, Fonts, Images)
    location /assets/ {
        alias /opt/hmi-flask/HMI/apex-hmi/dist/assets/;
        # alias C:/Shakil/DJangoProjects/NEW_HMI/HMI/apex-hmi/dist/assets/;  # Windows
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Favicon and other root static files
    location ~* ^/(favicon\.ico|manifest\.json|robots\.txt)$ {
        root /opt/hmi-flask/HMI/apex-hmi/dist;
        # root C:/Shakil/DJangoProjects/NEW_HMI/HMI/apex-hmi/dist;  # Windows
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # ========================================================================
    # Flask Backend API & WebSocket
    # ========================================================================dd_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Logging
    access_log /var/log/nginx/hmi-access.log combined;
    error_log /var/log/nginx/hmi-error.log warn;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    
    # Client body size (for file uploads)
    client_max_body_size 50M;
    
    # Static files (if served by nginx instead of Flask)
    location /static/ {
        alias /path/to/HMI/static/;  # Change to your path
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # WebSocket endpoint (Socket.IO)
    location /socket.io/ {
        proxy_pass http://hmi_backend/socket.io/;
        proxy_http_version 1.1;
        proxy_buffering off;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket specific headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Increased timeouts for WebSocket
        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }
    
    # API endpoints
    location /api/ {
        proxy_pass http://hmi_backend/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      ========================================================================
    # React SPA Routing (Must be LAST - catch-all)
    # ========================================================================
    
    # All other routes serve React app (SPA routing)
    location / {
        root /opt/hmi-flask/HMI/apex-hmi/dist;
        # root C:/Shakil/DJangoProjects/NEW_HMI/HMI/apex-hmi/dist;  # Windows
        try_files $uri $uri/ /index.html;
        
        # Disable caching for index.html to always get latest version
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
        proxy_busy_buffers_size 8k;
    }
    
    # Root location
    location / {
        proxy_pass http://hmi_backend;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Health check endpoint (for monitoring)
    location /health {
        proxy_pass http://hmi_backend/api/system/health;
        access_log off;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Rate Limiting (Optional but recommended)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

