
#user  nobody;
worker_processes  1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    #access_log  logs/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # Upstream Flask Backend
    upstream hmi_backend {
        server 127.0.0.1:6001 fail_timeout=30s max_fails=3;
        keepalive 32;
    }

    # React + Flask HMI Application - HTTP
    server {
        listen       8080;
        server_name  localhost;

        # Increase buffer sizes for WebSocket support
        client_max_body_size 50M;
        client_body_buffer_size 128k;
        
        # Logging
        access_log  logs/hmi_access.log;
        error_log   logs/hmi_error.log warn;

        # Gzip Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

        # React Build Assets (JS, CSS, images)
        location /assets/ {
            alias D:/CereveateHMI_Production/HMI/apex-hmi/dist/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Favicon and other root static files
        location ~* ^/(favicon\.ico|manifest\.json|robots\.txt)$ {
            root D:/CereveateHMI_Production/HMI/apex-hmi/dist;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # API Endpoints - Proxy to Flask Backend
        location /api/ {
            proxy_pass http://hmi_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket - Socket.IO
        location /socket.io/ {
            proxy_pass http://hmi_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Extended timeouts for WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # React SPA - Must be last (catch-all for SPA routing)
        location / {
            root D:/CereveateHMI_Production/HMI/apex-hmi/dist;
            try_files $uri $uri/ /index.html;
            
            # Disable caching for index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

        # proxy the PHP scripts to Apache listening on 127.0.0.1:80
        #
        #location ~ \.php$ {
        #    proxy_pass   http://127.0.0.1;
        #}

        # pass the PHP scripts to FastCGI server listening on 127.0.0.1:9000
        #
        #location ~ \.php$ {
        #    root           html;
        #    fastcgi_pass   127.0.0.1:9000;
        #    fastcgi_index  index.php;
        #    fastcgi_param  SCRIPT_FILENAME  /scripts$fastcgi_script_name;
        #    include        fastcgi_params;
        #}

        # deny access to .htaccess files, if Apache's document root
        # concurs with nginx's one
        #
        #location ~ /\.ht {
        #    deny  all;
        #}
    }

    # React + Flask HMI Application - HTTPS (Production)
    server {
        listen       8443 ssl;
        http2 on;
        server_name  localhost;

        # SSL Certificate Configuration (using local self-signed certs)
        ssl_certificate      ../ssl/localhost.crt;
        ssl_certificate_key  ../ssl/localhost.key;

        # SSL Security Settings (Modern Configuration)
        ssl_session_cache    shared:SSL:10m;
        ssl_session_timeout  10m;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;

        # Increase buffer sizes for WebSocket support
        client_max_body_size 50M;
        client_body_buffer_size 128k;
        
        # Logging
        access_log  logs/hmi_ssl_access.log;
        error_log   logs/hmi_ssl_error.log warn;

        # Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Gzip Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

        # React Build Assets (JS, CSS, images)
        location /assets/ {
            alias D:/CereveateHMI_Production/HMI/apex-hmi/dist/assets/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Favicon and other root static files
        location ~* ^/(favicon\.ico|manifest\.json|robots\.txt)$ {
            root D:/CereveateHMI_Production/HMI/apex-hmi/dist;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # API Endpoints - Proxy to Flask Backend
        location /api/ {
            proxy_pass http://hmi_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Timeout settings
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # WebSocket - Socket.IO
        location /socket.io/ {
            proxy_pass http://hmi_backend/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            
            # Extended timeouts for WebSocket
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # React SPA - Must be last (catch-all for SPA routing)
        location / {
            root D:/CereveateHMI_Production/HMI/apex-hmi/dist;
            try_files $uri $uri/ /index.html;
            
            # Disable caching for index.html
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }


    # HTTPS server
    #
    #server {
    #    listen       443 ssl;
    #    server_name  localhost;

    #    ssl_certificate      cert.pem;
    #    ssl_certificate_key  cert.key;

    #    ssl_session_cache    shared:SSL:1m;
    #    ssl_session_timeout  5m;

    #    ssl_ciphers  HIGH:!aNULL:!MD5;
    #    ssl_prefer_server_ciphers  on;

    #    location / {
    #        root   html;
    #        index  index.html index.htm;
    #    }
    #}

}
